name: moplayer_pro
description: "MoPlayer Pro - professional cinematic IPTV player for iPhone, Android preview, Windows preview, and web."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Backend
  supabase_flutter: ^2.8.0

  # Video player: libmpv-backed playback for HLS / MPEG-TS IPTV streams.
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Local cache / storage
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Images
  cached_network_image: ^3.4.1

  # Device / system
  wakelock_plus: ^1.2.10
  package_info_plus: ^8.1.2
  device_info_plus: ^11.2.0

  # Utils
  logger: ^2.5.0
  intl: ^0.20.2
  collection: ^1.19.0
  qr_flutter: ^4.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/demo/
