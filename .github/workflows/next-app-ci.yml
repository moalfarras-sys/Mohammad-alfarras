name: Next App CI

on:
  push:
    branches: ["main"]
    paths:
      - "app-next/**"
      - ".github/workflows/next-app-ci.yml"
  pull_request:
    paths:
      - "app-next/**"
      - ".github/workflows/next-app-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-next

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-next/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
