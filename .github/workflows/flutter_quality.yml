name: MoPlayer iOS Flutter Quality

on:
  pull_request:
    paths:
      - "apps/MoPlayer iphone ios/**"
      - ".github/workflows/flutter_quality.yml"
  push:
    branches:
      - main
      - "codex/**"
      - "fix/**"
    paths:
      - "apps/MoPlayer iphone ios/**"
      - ".github/workflows/flutter_quality.yml"
  workflow_dispatch:

jobs:
  flutter-quality:
    name: Analyze and test Flutter iOS app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/MoPlayer iphone ios"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web debug preview
        run: flutter build web --debug --dart-define=MOPLAYER_PLATFORM=ios
